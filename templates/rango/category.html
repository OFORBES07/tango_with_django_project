<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Rango</title>
</head>
<body>
    <h1>Rango says...</h1>
    {% if category %}
        <h1>{{ category.name }}</h1>
        {% if pages %}
        <ul>
            {% for page in pages %}
            <li><a href="{{ page.url }}">{{ page.title }}</a></li>
            {% endfor %}
        </ul>
        {% else %}
        <strong>No pages currently in category.</strong>
        {% endif %}
    {% else %}
        <strong>The specified category does not exist.</strong>
    {% endif %}
    <a href="/rango/">Index</a>
</body>
</html>
